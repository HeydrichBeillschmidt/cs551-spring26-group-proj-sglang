# sglang.yaml
envs:
  HF_TOKEN: null

resources:
  image_id: docker:lmsysorg/sglang:v0.4.10.post2-cu126
  accelerators: T4:1
  ports: 30000
  cloud: kubernetes

run: |
  conda deactivate
  python3 -m sglang.launch_server \
    --model-path "google/gemma-2-2b-it" \
    --enable-metrics \
    --host 0.0.0.0 \
    --port 30000

